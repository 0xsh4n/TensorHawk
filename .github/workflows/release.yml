name: Release

# Cut a release by pushing a semver tag:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN: tensorhawk

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   ext: "" }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl,  ext: "" }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,  ext: "" }
          - { os: macos-latest,   target: x86_64-apple-darwin,        ext: "" }
          - { os: macos-latest,   target: aarch64-apple-darwin,       ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tooling (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo install cross --locked || true
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cross build --release --target ${{ matrix.target }} -p tensorhawk-cli
          else
            cargo build --release --target ${{ matrix.target }} -p tensorhawk-cli
          fi

      - name: Package
        id: package
        shell: bash
        run: |
          BINPATH="target/${{ matrix.target }}/release/${BIN}${{ matrix.ext }}"
          ARCHIVE="${BIN}-${{ matrix.target }}"
          mkdir -p "dist/${ARCHIVE}"
          cp "$BINPATH" "dist/${ARCHIVE}/"
          cp README.md LICENSE "dist/${ARCHIVE}/"
          cd dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "${ARCHIVE}.zip" "${ARCHIVE}" >/dev/null
            echo "asset=dist/${ARCHIVE}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
            echo "asset=dist/${ARCHIVE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Checksum
        shell: bash
        run: |
          cd dist
          asset="$(basename '${{ steps.package.outputs.asset }}')"
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets and aggregate checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          find artifacts -type f -name '*.sha256' -exec cat {} + > release/SHA256SUMS
          # Fail loudly rather than shipping an empty checksum file.
          if [ ! -s release/SHA256SUMS ]; then
            echo "::error::SHA256SUMS is empty — no checksum files were collected"; exit 1
          fi
          echo "--- SHA256SUMS ---"; cat release/SHA256SUMS
          ls -la release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: TensorHawk ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS
